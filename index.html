<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./main.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="blog__card">
      <img
        class="blog__image"
        src="./assets/images/illustration-article.svg"
        alt=""
      />
      <div class="blog__details">
        <p class="blog__purpose">Learning</p>

        <p class="blog__date">Published 21 Dec 2023</p>

        <h3 class="blog__heading">HTML & CSS foundations</h3>

        <p class="blog__description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>
      <div class="blog__user">
        <img class="blog__user__avatar" src="./assets/images/image-avatar.webp" alt="" /> <p class="blog__user__text">Greg Hooper</p>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Asif Ali</a>.
    </footer>
  </body>
</html>
