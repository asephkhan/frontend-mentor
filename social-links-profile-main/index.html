<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./main.css" />
    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="profile__container">
      <img
        class="profile__pic"
        src="./assets/images/avatar-jessica.jpeg"
        alt=""
      />

      <h3 class="profile__name">Jessica Randall</h3>
      <p class="profile__location">London, United Kingdom</p>
      <p class="profile__discription">"Front-end developer and avid reader."</p>
      <div class="profile__links__container">
      <button class="profile__links__container__button" href="github.com">GitHub</button>
      <button class="profile__links__container__button" href="frontendmentor.io"> Frontend Mentor </button>
      <button class="profile__links__container__button" href="linkedin.com"> LinkedIn </button>
      <button class="profile__links__container__button" href="x.com"> Twitter </button>
      <button class="profile__links__container__button" href="instagram.com"> Instagram </button>
      </div>

    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Asif Ali</a>.
    </footer>
  </body>
</html>
